name: Update IRS forms catalog

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Refresh IRS catalog
        run: python scripts/sync_irs_forms.py --dataset all

      - name: Commit updates
        run: |
          if [[ -z "$(git status --porcelain data/irs)" ]]; then
            echo "No IRS catalog changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/irs
          git commit -m "Update IRS forms catalog"
          git push
